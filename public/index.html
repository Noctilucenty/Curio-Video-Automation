<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curio Automation — Review</title>
<style>
  :root {
    --bg: #0b0b0f; --panel: #14141b; --panel2: #1b1b24; --line: #26262f;
    --text: #f5efe2; --dim: #9a97a3; --gold: #e8b44f; --green: #6fcf97;
    --red: #eb5757; --blue: #6ea8fe;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, 'SF Pro Text', Inter, sans-serif; }
  header { display: flex; align-items: center; gap: 16px; padding: 18px 28px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: rgba(11,11,15,.92);
    backdrop-filter: blur(8px); z-index: 5; }
  header h1 { font-size: 17px; margin: 0; letter-spacing: .3px; }
  header h1 span { color: var(--gold); }
  header .meta { color: var(--dim); font-size: 12px; }
  header .spacer { flex: 1; }
  input, textarea, select { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font: inherit; }
  input:focus, textarea:focus { outline: 1px solid var(--gold); }
  button { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 14px; font: inherit; cursor: pointer; }
  button:hover { border-color: var(--gold); }
  button.primary { background: var(--gold); color: #14110a; font-weight: 700; border: none; }
  button.approve { color: var(--green); } button.reject { color: var(--red); }
  main { max-width: 1080px; margin: 0 auto; padding: 24px 28px 80px; }
  section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--dim); margin: 34px 0 12px; }
  .gen { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .gen input[name=topic] { flex: 1; min-width: 320px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--line);
    text-transform: uppercase; letter-spacing: .8px; color: var(--dim); }
  .badge.ready_for_review { color: var(--gold); border-color: var(--gold); }
  .badge.needs_revision { color: var(--blue); border-color: var(--blue); }
  .badge.approved, .badge.published { color: var(--green); border-color: var(--green); }
  .badge.rejected, .badge.failed { color: var(--red); border-color: var(--red); }
  .hook { font-size: 17px; font-weight: 700; margin: 10px 0 2px; }
  .script { color: var(--dim); font-size: 13.5px; margin: 6px 0; }
  .caps { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .cap { background: var(--panel2); border-radius: 6px; padding: 3px 9px; font-size: 12.5px; }
  .cap b { color: var(--gold); font-weight: 700; }
  .scores { display: flex; gap: 12px; flex-wrap: wrap; margin: 10px 0; font-size: 12px; color: var(--dim); }
  .scores b { color: var(--text); }
  .scores .bad b { color: var(--red); }
  .problems { color: var(--red); font-size: 12.5px; }
  video { max-width: 220px; border-radius: 10px; margin-top: 8px; }
  a { color: var(--blue); }
  .empty { color: var(--dim); font-style: italic; padding: 8px 2px; }
  .rule { font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .rule .cat { color: var(--gold); font-size: 11px; text-transform: uppercase; margin-right: 8px; }
  .rule.inactive { opacity: .4; text-decoration: line-through; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--gold); border-radius: 10px;
    padding: 10px 18px; display: none; z-index: 10; }
</style>
</head>
<body>
<header>
  <h1><span>Curio</span> Automation — Review Queue</h1>
  <div class="meta" id="meta">…</div>
  <div class="spacer"></div>
  <button onclick="refresh()">Refresh</button>
      <button onclick="logout()">Log out</button>
</header>
<main>
  <section>
    <h2>Generate</h2>
    <form class="gen" onsubmit="generate(event)">
      <input name="topic" placeholder="Topic — e.g. Why your brain remembers embarrassing moments more than compliments" required>
      <input name="category" placeholder="category" value="psychology" size="10">
      <select name="platform"><option>tiktok</option><option>reels</option><option>shorts</option></select>
      <button class="primary">Generate video</button>
    </form>
  </section>

  <section>
    <h2>Needs your review</h2>
    <div id="queue"><div class="empty">Loading…</div></div>
  </section>

  <section>
    <h2>All videos</h2>
    <div id="all"></div>
  </section>

  <section>
    <h2>Analytics — paste anything</h2>
    <div class="card">
      <textarea id="analytics" rows="5" style="width:100%" placeholder="Paste raw analytics from TikTok / IG / YouTube — UI text, CSV, notes, any format. One video or many. Example:&#10;hook=&quot;They found the ship intact&quot; platform=instagram views=12000 completion_rate=42% saves=144 shares=97 likes=830 comments=31 avg_watch_time=18.4"></textarea>
      <div class="row" style="margin-top:10px">
        <button class="primary" onclick="ingest()">Ingest analytics</button>
        <span class="meta" id="ingest-result" style="color:var(--dim);font-size:12.5px"></span>
      </div>
    </div>
    <div id="perf"></div>
  </section>

  <section>
    <h2>Learning <button style="float:right" onclick="runLearning()">Run learning analysis</button></h2>
    <div id="insights"></div>
    <div id="rules"></div>
  </section>
</main>
<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
// Auth is a server-issued HttpOnly session cookie. The token is NEVER in JS or
// localStorage — a single XSS would otherwise exfiltrate it permanently.
// JS only touches the CSRF token, which is useless without the session cookie
// the browser attaches automatically.
function csrfToken() {
  const m = document.cookie.match(/(?:^|;\s*)curio_csrf=([^;]+)/);
  return m ? decodeURIComponent(m[1]) : '';
}
function headers(json) {
  const h = json ? { 'content-type': 'application/json' } : {};
  const t = csrfToken();
  if (t) h['x-curio-csrf'] = t;
  return h;
}
async function logout() {
  await fetch('/api/auth/logout', { method: 'POST', headers: headers(false) });
  location.reload();
}
function showLogin(msg) {
  document.body.innerHTML =
    '<div style="max-width:340px;margin:16vh auto;font:15px/1.5 -apple-system,sans-serif;color:#f5efe2">'
    + '<h1 style="font-size:19px;letter-spacing:.5px">Curio</h1>'
    + '<p style="color:#9a97a3;font-size:13px">' + (msg || 'Sign in to continue.') + '</p>'
    + '<input id="pw" type="password" placeholder="Password" autofocus '
    + 'style="width:100%;padding:11px 12px;background:#14141b;color:#f5efe2;'
    + 'border:1px solid #26262f;border-radius:9px;font:inherit">'
    + '<button id="go" style="width:100%;margin-top:10px;padding:12px;background:#e8b44f;'
    + 'color:#14110a;font-weight:700;border:0;border-radius:9px;cursor:pointer">Sign in</button>'
    + '<p id="err" style="color:#eb5757;font-size:12px;min-height:16px"></p></div>';
  const submit = async () => {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value }),
    });
    if (res.ok) { location.reload(); return; }
    const b = await res.json().catch(() => ({}));
    document.getElementById('err').textContent =
      res.status === 429 ? 'Too many attempts — wait and try again.' : (b.error || 'Sign-in failed');
  };
  document.getElementById('go').onclick = submit;
  document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, opts);
  if (res.status === 401) { showLogin('Your session expired.'); throw new Error('unauthenticated'); }
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || res.status);
  return body;
}
function toast(msg, ok = true) {
  const t = $('toast');
  t.textContent = msg;
  t.style.borderColor = ok ? 'var(--gold)' : 'var(--red)';
  t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 3200);
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function scoreRow(j) {
  if (!j) return '';
  const cells = [
    ['hook', j.hook_score, 8], ['retention', j.retention_score, 0], ['clarity', j.clarity_score, 0],
    ['captions', j.caption_readability, 8], ['brand', j.brand_fit, 8],
    ['viral', j.viral_potential, 7], ['safety', j.factual_safety, 8], ['overall', j.overall_score, 0],
  ].map(([k, v, min]) => `<span class="${min && v < min ? 'bad' : ''}">${k} <b>${v}</b></span>`).join('');
  const probs = (j.problems || []).length
    ? `<div class="problems">⚠ ${j.problems.map(esc).join(' · ')}</div>` : '';
  return `<div class="scores">${cells}</div>${probs}`;
}

function pipeChips(v) {
  const chip = (label, status, extra) => {
    const color = status === 'completed' ? 'var(--green)' : status === 'failed' ? 'var(--red)' : 'var(--dim)';
    return `<span class="badge" style="color:${color};border-color:${color}" title="${esc(extra || '')}">${label}: ${esc(status || '—')}</span>`;
  };
  const ops = v.post?.operations;
  const postLabel = ops ? `captions${ops.cutFillers ? '+fillers cut' : ''}${ops.cutSilences ? '+silences cut' : ''}` : 'post';
  return `<div class="row" style="margin-top:6px">
    ${v.audio ? chip('voice ' + v.audio.provider, v.audio.status, v.audio.error) : ''}
    ${chip('render ' + v.render.provider, v.render.status, v.render.error)}
    ${v.post ? chip(postLabel + ' ' + v.post.provider, v.post.status, v.post.error) : ''}
    ${v.post?.status === 'failed' ? `<button onclick="act('${v.id}','postprocess')">Retry captions</button>` : ''}
  </div>`;
}

function videoCard(v, withActions) {
  const p = v.package;
  const caps = p ? p.caption_lines.map((l) => {
    const t = esc(l.text);
    const em = l.emphasis ? t.replace(new RegExp(esc(l.emphasis).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'), (m) => `<b>${m}</b>`) : t;
    return `<span class="cap">${em}</span>`;
  }).join('') : '';
  const finalUrl = v.final_video_url;
  const vid = finalUrl
    ? (finalUrl.includes('mock')
        ? `<div class="script">mock output: <a href="${esc(finalUrl)}">${esc(finalUrl)}</a></div>`
        : `<video src="${esc(finalUrl)}" controls></video>`)
    : '';
  const actions = withActions ? `<div class="row" style="margin-top:10px">
      ${v.status === 'ready_for_review' ? `<button class="approve" onclick="act('${v.id}','approve')">Approve</button>
      <button class="reject" onclick="act('${v.id}','reject')">Reject</button>` : ''}
      ${v.status === 'approved' ? `<button class="primary" onclick="act('${v.id}','publish')">Mark published</button>` : ''}
      <button onclick="act('${v.id}','regenerate')">Regenerate</button>
      <button onclick="editVideo('${v.id}')">Edit script/hook</button>
      ${p ? `<a href="/api/videos/${v.id}/captions.srt" download>captions.srt</a>` : ''}
    </div>` : '';
  return `<div class="card">
    <div class="row"><span class="badge ${v.status}">${v.status.replace(/_/g, ' ')}</span>
      <span class="meta" style="color:var(--dim);font-size:12px">${v.id} · attempts ${v.attempts}${v.review_note ? ' · ' + esc(v.review_note) : ''}${v.error ? ' · <span style="color:var(--red)">' + esc(v.error) + '</span>' : ''}</span></div>
    ${p ? `<div class="hook">${esc(p.selected_hook)}</div>
      <div class="script">${esc(p.script)}</div>
      <div class="caps">${caps}</div>` : '<div class="empty">generating…</div>'}
    ${scoreRow(v.judge)}${pipeChips(v)}${vid}${actions}
  </div>`;
}

function perfTable(rows) {
  if (!rows.length) return '<div class="empty">No performance data yet — publish videos, then paste analytics above.</div>';
  const tr = rows.map((r) => `<tr>
    <td style="max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.hook || r.video_id)}</td>
    <td>${esc(r.platform)}</td><td>${r.views.toLocaleString()}</td>
    <td>${Math.round(r.completion_rate * 100)}%</td>
    <td>${r.saves}</td><td>${r.shares}</td>
    <td style="color:var(--gold);font-weight:700">${r.engagement_score}</td></tr>`).join('');
  return `<div class="card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="color:var(--dim);text-align:left"><th>video</th><th>platform</th><th>views</th><th>completion</th><th>saves</th><th>shares</th><th>engagement</th></tr></thead>
    <tbody>${tr}</tbody></table></div>`;
}

function insightsPanel(run) {
  if (!run) return '';
  const list = (title, items) => items && items.length
    ? `<div style="margin-top:8px"><span class="cat" style="color:var(--gold);font-size:11px;text-transform:uppercase">${title}</span>
       ${items.map((i) => `<div class="rule" style="border:none;padding:2px 0">${esc(i)}</div>`).join('')}</div>` : '';
  const delta = run.improvementDelta != null
    ? `<div style="margin-top:8px;font-weight:700;color:${run.improvementDelta >= 0 ? 'var(--green)' : 'var(--red)'}">
       Loop check: engagement ${run.improvementDelta >= 0 ? '+' : ''}${run.improvementDelta} since previous run</div>` : '';
  return `<div class="card">
    <div class="row"><span class="badge">last learning run</span>
      <span class="meta" style="color:var(--dim);font-size:12px">${run.analyzedVideos} videos · ${new Date(run.createdAt).toLocaleString()}</span></div>
    ${delta}
    ${list('What wins', run.topPatterns)}
    ${list('What loses', run.weakPatterns)}
    ${list('Per platform', run.platformNotes)}
    ${list('Judge calibration', run.judgeCalibrationNotes)}
    ${list('Next topics', (run.recommendedTopics || []).slice(0, 5))}
  </div>`;
}

async function refresh() {
  // Each section renders independently — one flaky endpoint (e.g. during a
  // server restart) must not blank the whole dashboard.
  const [meta, queue, all, rules, perf, runs] = await Promise.allSettled([
    api('/meta'), api('/review-queue'), api('/videos'), api('/learning/rules'),
    api('/performance/summary'), api('/learning/runs'),
  ]);
  if (meta.status === 'fulfilled') {
    $('meta').textContent = `brain ${meta.value.llm_model} · voice ${meta.value.voice} · render ${meta.value.renderer} · post ${meta.value.post}`;
  }
  if (queue.status === 'fulfilled') {
    $('queue').innerHTML = queue.value.videos.length
      ? queue.value.videos.map((v) => videoCard(v, true)).join('')
      : '<div class="empty">Nothing waiting on you.</div>';
  }
  if (all.status === 'fulfilled') {
    $('all').innerHTML = all.value.videos.length
      ? all.value.videos.map((v) => videoCard(v, ['approved'].includes(v.status) || ['rejected','failed'].includes(v.status))).join('')
      : '<div class="empty">No videos yet — generate one above.</div>';
  }
  if (perf.status === 'fulfilled') $('perf').innerHTML = perfTable(perf.value.videos);
  if (runs.status === 'fulfilled') $('insights').innerHTML = insightsPanel(runs.value.runs[0]);
  if (rules.status === 'fulfilled') {
    $('rules').innerHTML = rules.value.rules.length
      ? rules.value.rules.slice().reverse().map((r) =>
          `<div class="rule ${r.active ? '' : 'inactive'}"><span class="cat">${r.category} · ${r.source}</span>${esc(r.rule)}</div>`).join('')
      : '<div class="empty">No rules yet.</div>';
  }
  const failed = [meta, queue, all, rules, perf, runs].filter((r) => r.status === 'rejected');
  if (failed.length) toast(`Load failed for ${failed.length} section(s): ${failed[0].reason?.message ?? failed[0].reason}`, false);
}

async function ingest() {
  const raw = $('analytics').value.trim();
  if (!raw) { toast('Paste analytics text first.', false); return; }
  try {
    const report = await api('/performance/ingest', {
      method: 'POST', headers: headers(true), body: JSON.stringify({ raw }),
    });
    const unmatched = report.unmatched || [];
    const un = unmatched.length
      ? ` · ${unmatched.length} unmatched: ${unmatched.map((u) => u.reason).join(' | ')}`
      : report.matched.length === 0 ? ' · no analytics entries parsed' : '';
    const zeroReason = unmatched.length ? 'check the unmatched reasons.' : 'no analytics entries were parsed.';
    $('ingest-result').textContent = `matched ${report.matched.length}${un}`;
    if (report.matched.length) {
      // Keep the paste when anything went unmatched so the operator can fix
      // those lines and re-ingest; only a fully clean run clears the box.
      if (!unmatched.length) $('analytics').value = '';
      toast(`Ingested ${report.matched.length} video(s) — run learning to convert it into rules.`);
    } else {
      toast(`Nothing matched — ${zeroReason}`, false);
    }

    // ---- Autopilot -------------------------------------------------------
    let apRunId = null, apES = null, apStart = 0, apTimer = null;

    function apConfig() {
      const plat = $('ap-platforms').value;
      const allowVeo = $('ap-veo').value === '1';
      return {
        platforms: plat === 'both' ? ['reels','shorts'] : [plat],
        targetRuntime: { minSeconds: +$('ap-rtmin').value, maxSeconds: +$('ap-rtmax').value },
        maxSpendUsd: +$('ap-spend').value,
        category: $('ap-category').value || 'auto',
        factualRisk: $('ap-risk').value,
        visualPolicy: $('ap-visual').value,
        allowPaidStock: $('ap-stock').value === '1',
        allowVeo,
        maxImageCalls: +$('ap-maximg').value,
        maxVideoCalls: allowVeo ? +$('ap-maxvid').value : 0,
        qualityProfile: $('ap-quality').value,
        dryRun: $('ap-dry').value === '1',
        maxCorrectionPasses: +$('ap-corr').value,
      };
    }

    async function apGo() {
      const btn = $('ap-go');
      btn.disabled = true;                       // guard #1: no double-click
      try {
        const res = await fetch('/api/autopilot/runs', {
          method: 'POST',
          headers: Object.assign(headers(true), {
            // guard #2: server-side idempotency, survives a refresh mid-click
            'idempotency-key': 'btn-' + Date.now() + '-' + Math.random().toString(36).slice(2,8),
          }),
          body: JSON.stringify(apConfig()),
        });
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || res.status);
        apAttach(body.run_id);
        toast('Run queued — generating.', true);
      } catch (e) { toast(e.message, false); btn.disabled = false; }
    }

    function apAttach(runId) {
      apRunId = runId; apStart = Date.now();
      $('ap-live').style.display = 'block';
      $('ap-logs').innerHTML = '';
      clearInterval(apTimer);
      apTimer = setInterval(() => {
        $('ap-elapsed').textContent = Math.round((Date.now()-apStart)/1000) + 's';
      }, 1000);
      if (apES) apES.close();
      apES = new EventSource('/api/autopilot/runs/' + runId + '/events');
      apES.addEventListener('state', e => apState(JSON.parse(e.data)));
      apES.addEventListener('log', e => apLog(JSON.parse(e.data)));
      apES.addEventListener('done', e => { apState(JSON.parse(e.data)); apDone(); });
      apES.onerror = () => { /* SSE reconnects on its own; polling stays as fallback */ };
    }

    function apState(s) {
      $('ap-bar').style.width = Math.round((s.progress||0)*100) + '%';
      $('ap-stage').textContent = s.stage_label || s.state;
      $('ap-spend-live').textContent = '$' + Number(s.spent_usd||0).toFixed(2)
        + ' / $' + Number(s.budget_usd||0).toFixed(2);
      $('ap-topic').innerHTML = s.topic_title ? 'topic <b>'+esc(s.topic_title)+'</b>' : '';
      $('ap-blocker').innerHTML = s.blocker
        ? '<div class="blocker"><b>'+esc(s.blocker.code)+'</b><br>'+esc(s.blocker.detail||'')
          +'<br><span class="muted">'+esc(s.blocker.help||'')+'</span></div>'
        : '';
      if (s.state === 'READY_FOR_REVIEW') { refresh(); }
    }

    function apLog(l) {
      const el = $('ap-logs');
      const t = new Date().toLocaleTimeString();
      el.insertAdjacentHTML('beforeend',
        '<div class="'+esc(l.level||'info')+'"><span class="t">'+t+'</span> '+esc(l.message)+'</div>');
      el.scrollTop = el.scrollHeight;
    }

    function apDone() {
      clearInterval(apTimer);
      $('ap-go').disabled = false;
      if (apES) { apES.close(); apES = null; }
    }

    async function apCtl(action) {
      if (!apRunId) return;
      try {
        const res = await fetch('/api/autopilot/runs/'+apRunId+'/'+action,
          { method:'POST', headers: headers(true) });
        const b = await res.json();
        if (!res.ok) throw new Error(b.error || res.status);
        apState(b); toast(action + ' ok', true);
        if (action === 'resume' || action === 'retry-stage') apAttach(apRunId);
      } catch (e) { toast(e.message, false); }
    }

    $('ap-go').addEventListener('click', apGo);

    refresh();
  } catch (e) { toast('Ingest failed: ' + e.message, false); }
}

async function generate(ev) {
  ev.preventDefault();
  const f = ev.target;
  try {
    await api('/videos/generate', { method: 'POST', headers: headers(true), body: JSON.stringify({
      topic: f.topic.value, category: f.category.value, target_platform: f.platform.value,
    }) });
    f.topic.value = '';
    toast('Generation queued — refresh in a few seconds.');
    setTimeout(refresh, 1200); setTimeout(refresh, 5000);
  } catch (e) { toast('Generate failed: ' + e.message, false); }
}

async function act(id, action) {
  const body = {};
  if (action === 'reject') {
    const reason = prompt('Reject reason (optional)') || '';
    if (reason) body.reason = reason;
  }
  try {
    await api(`/videos/${id}/${action}`, { method: 'POST', headers: headers(true), body: JSON.stringify(body) });
    toast(`${action} ✓`); refresh();
  } catch (e) { toast(`${action} failed: ${e.message}`, false); }
}

async function editVideo(id) {
  try {
    const v = await api('/videos/' + id);
    const hook = prompt('Hook:', v.package?.selected_hook || ''); if (hook === null) return;
    const script = prompt('Script:', v.package?.script || ''); if (script === null) return;
    await api(`/videos/${id}/edit`, { method: 'POST', headers: headers(true),
      body: JSON.stringify({ hook, script }) });
    toast('Edited — re-judging and re-rendering.'); setTimeout(refresh, 1200);
  } catch (e) { toast('Edit failed: ' + e.message, false); }
}

async function runLearning() {
  try {
    const run = await api('/learning/run', { method: 'POST', headers: headers(true), body: '{}' });
    toast(`Learning run done — ${run.newRuleIds.length} new rules from ${run.analyzedVideos} videos.`);
    refresh();
  } catch (e) { toast('Learning: ' + e.message, false); }
}

fetch('/api/auth/session')
  .then(r => { if (r.status === 401) { showLogin(); return null; } return r.json(); })
  .then(ok => { if (ok) { refresh(); setInterval(refresh, 15000); } });
</script>
</body>
